<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimi - Voice Portal</title>
    <link rel="stylesheet" href="/style/static.css">
    <link rel="icon" type="image/png" href="/image/favicon.png">
    <script src="/script/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.0/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
        }

        .portal-header {
            background: var(--bg-color-d);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .portal-header img {
            height: 28px;
            width: 28px;
        }
        .portal-header h1 {
            margin: 0;
            font-size: 18px;
            color: var(--primary);
        }
        .portal-header .status {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-color-quiet);
        }

        .transcript {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 15px;
            white-space: pre-wrap;
        }
        .msg.user {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: var(--bg-color-d);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }
        .msg.error {
            align-self: center;
            background: #fee;
            color: #c00;
            font-size: 13px;
        }
        .msg.system {
            align-self: center;
            color: var(--text-color-quiet);
            font-size: 13px;
            font-style: italic;
        }

        .controls {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--bg-color-d);
            flex-shrink: 0;
        }

        /* Status orb — replaces talk button */
        .status-orb {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--page-border);
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.3s;
            cursor: default;
            position: relative;
        }
        .status-orb .orb-label {
            font-size: 13px;
            color: var(--text-color-quiet);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .status-orb svg {
            width: 36px;
            height: 36px;
            stroke: var(--text-color-quiet);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Orb states */
        .status-orb.idle {
            border-color: var(--page-border);
        }
        .status-orb.idle svg { stroke: var(--text-color-quiet); }

        .status-orb.thinking {
            border-color: var(--rust-mid, #a04020);
            animation: pulse-rust 2s infinite;
        }
        .status-orb.thinking svg { stroke: var(--rust-mid, #a04020); }

        .status-orb.speaking {
            border-color: var(--primary);
            background: var(--primary);
        }
        .status-orb.speaking svg { stroke: #fff; }
        .status-orb.speaking .orb-label { color: #fff; }

        .status-orb.muted {
            border-color: var(--action-color, #c00);
            opacity: 0.5;
        }

        @keyframes pulse-rust {
            0%, 100% { box-shadow: 0 0 0 0 rgba(160, 64, 32, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(160, 64, 32, 0); }
        }

        .text-input {
            display: flex;
            gap: 8px;
            flex: 1;
            align-items: flex-end;
        }
        .text-input textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--page-border);
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            resize: none;
            min-height: 40px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.4;
        }
        .text-input textarea:focus {
            border-color: var(--primary);
        }
        .text-input button {
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .mute-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--page-border);
            background: var(--bg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .mute-btn:hover {
            border-color: var(--primary);
        }
        .mute-btn.muted {
            border-color: var(--action-color);
            background: var(--action-color);
        }
        .mute-btn.muted svg {
            stroke: #fff;
        }
        .mute-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-color);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .listening-indicator {
            font-size: 13px;
            color: var(--accent);
            min-height: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header data-widget="header"></header>
    <div class="portal-header">
        <img src="./icon.svg" alt="Mimi">
        <h1>Mimi</h1>
        <span class="status" id="statusText">Initializing...</span>
    </div>

    <div class="transcript" id="transcript"></div>

    <div class="listening-indicator" id="listenIndicator"></div>

    <div class="controls">
        <div class="text-input">
            <textarea id="textInput" placeholder="Type a message..." rows="1" autocomplete="off"></textarea>
            <button id="sendBtn">Send</button>
        </div>
        <button class="mute-btn" id="muteBtn" title="Mute microphone">
            <svg viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="muteWave1"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="muteWave2"/>
            </svg>
        </button>
        <div class="status-orb idle" id="statusOrb">
            <svg viewBox="0 0 24 24">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span class="orb-label" id="orbLabel">idle</span>
        </div>
    </div>

    <script>
    (function() {
        const transcript = document.getElementById('transcript');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        const listenIndicator = document.getElementById('listenIndicator');
        const muteBtn = document.getElementById('muteBtn');
        const statusOrb = document.getElementById('statusOrb');
        const orbLabel = document.getElementById('orbLabel');

        let sessionId = null;
        let busy = false; // prevent overlapping requests
        let isMuted = (function() {
            const m = document.cookie.match(/(?:^|;\s*)mimi_mic=(\w+)/);
            return m ? m[1] !== 'on' : true;
        })();
        let vadInstance = null;
        let currentAudio = null;
        let synthesis = window.speechSynthesis;
        let audioCtx = null;

        function ensureAudioContext() {
            if (audioCtx) return audioCtx;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const silent = audioCtx.createBuffer(1, 1, 22050);
            const src = audioCtx.createBufferSource();
            src.buffer = silent;
            src.connect(audioCtx.destination);
            src.start();
            return audioCtx;
        }
        ['click', 'touchstart', 'keydown'].forEach(evt => {
            document.addEventListener(evt, ensureAudioContext, { once: true });
        });

        let state = 'idle';

        function setState(newState, detail) {
            state = newState;
            statusOrb.className = 'status-orb ' + newState;
            orbLabel.textContent = newState;
            switch (newState) {
                case 'idle':
                    statusText.textContent = isMuted ? 'Type a message' : 'Say "Mimi" to wake';
                    listenIndicator.textContent = '';
                    break;
                case 'thinking':
                    statusText.textContent = detail || 'Thinking...';
                    listenIndicator.textContent = '';
                    break;
                case 'speaking':
                    statusText.textContent = 'Speaking...';
                    listenIndicator.textContent = '';
                    break;
                case 'muted':
                    statusText.textContent = 'Muted';
                    listenIndicator.textContent = '';
                    break;
            }
        }

        // ---- WAV encoder ----
        function float32ToWav(samples, sampleRate) {
            const numChannels = 1, bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const dataSize = samples.length * (bitsPerSample / 8);
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);
            let offset = 44;
            for (let i = 0; i < samples.length; i++) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                view.setInt16(offset, s, true);
                offset += 2;
            }
            return buffer;
        }
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        }

        // ---- Attentive mode ----
        let attentive = false;
        let attentiveTimer = null;

        function startAttentiveMode() {
            attentive = true;
            if (attentiveTimer) clearTimeout(attentiveTimer);
            attentiveTimer = setTimeout(() => {
                attentive = false;
                attentiveTimer = null;
                if (state === 'idle') statusText.textContent = isMuted ? 'Type a message' : 'Say "Mimi" to wake';
            }, 10000);
            statusText.textContent = 'Listening...';
        }

        // ---- SSE stream parser: reads fetch response body as SSE events ----
        async function readSSEStream(response, handlers) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let currentEvent = 'message';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // keep incomplete line in buffer

                for (const line of lines) {
                    if (line.startsWith('event: ')) {
                        currentEvent = line.slice(7).trim();
                    } else if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        try {
                            const data = JSON.parse(dataStr);
                            if (handlers[currentEvent]) handlers[currentEvent](data);
                        } catch (e) {
                            console.warn('[Mimi] SSE parse error:', e, dataStr);
                        }
                        currentEvent = 'message';
                    }
                    // blank lines and other lines are ignored
                }
            }
        }

        // ---- Stream a message from the server via SSE ----
        async function streamMessage(text, isVoice) {
            if (busy) return;
            busy = true;
            setState('thinking');
            addMessage('user', text);

            const msgDiv = addMessage('assistant', '');
            let fullText = '';
            let audioUrl = null;

            try {
                const resp = await fetch('./message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, voice: isVoice })
                });

                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({ message: 'Server error' }));
                    addMessage('error', err.message || err.error || 'Request failed');
                    busy = false;
                    setState('idle');
                    return;
                }

                await readSSEStream(resp, {
                    session: (data) => {
                        if (data.sessionId) sessionId = data.sessionId;
                    },
                    text: (data) => {
                        fullText += data.text;
                        msgDiv.textContent = fullText;
                        transcript.scrollTop = transcript.scrollHeight;
                        // Switch to streaming state on first text
                        if (state === 'thinking') setState('thinking', 'Responding...');
                    },
                    tool: (data) => {
                        setState('thinking', 'Using ' + data.name + '...');
                    },
                    audio: (data) => {
                        audioUrl = data.url;
                    },
                    error: (data) => {
                        addMessage('error', data.message || 'Something went wrong');
                    },
                    done: () => {
                        // Remove empty assistant bubble if no text was generated
                        if (!fullText && msgDiv.parentNode) {
                            msgDiv.parentNode.removeChild(msgDiv);
                        }
                    }
                });

                // Play audio (voice) or speak (text input fallback)
                if (fullText) {
                    if (audioUrl) {
                        await playAudio(audioUrl, fullText);
                    } else if (isVoice) {
                        await speak(fullText);
                    }
                }
            } catch (err) {
                console.error('[Mimi] Stream error:', err);
                if (!fullText) addMessage('error', 'Failed to get response');
            }

            busy = false;
            setState('idle');
            if (isVoice) startAttentiveMode();
        }

        // ---- Voice: transcribe then stream ----
        async function sendAudio(float32Samples) {
            if (state === 'muted' || busy) return;

            try {
                const wavBuffer = float32ToWav(float32Samples, 16000);
                const wavBytes = new Uint8Array(wavBuffer);
                let binary = '';
                for (let i = 0; i < wavBytes.length; i++) binary += String.fromCharCode(wavBytes[i]);
                const base64 = btoa(binary);

                const resp = await fetch('./audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: base64, attentive })
                });
                const data = await resp.json();

                if (data.status === 'ignored' || data.status === 'error') {
                    if (data.status === 'error') addMessage('error', data.message || 'Audio failed');
                    return;
                }

                // Wake word matched — clear attentive, stream response
                attentive = false;
                if (attentiveTimer) { clearTimeout(attentiveTimer); attentiveTimer = null; }

                if (data.text) {
                    await streamMessage(data.text, true);
                }
            } catch (err) {
                console.error('[Mimi] Audio send error:', err);
                addMessage('error', 'Failed to process audio');
            }
        }

        // ---- TTS via speechSynthesis (fallback) ----
        function speak(text) {
            if (!synthesis || isMuted) return Promise.resolve();
            const voices = synthesis.getVoices();
            if (!voices || voices.length === 0) return Promise.resolve();
            return new Promise((resolve) => {
                const timeout = setTimeout(() => { synthesis.cancel(); resolve(); }, 30000);
                synthesis.cancel();
                setState('speaking');
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.onend = () => { clearTimeout(timeout); resolve(); };
                utterance.onerror = () => { clearTimeout(timeout); resolve(); };
                synthesis.speak(utterance);
            });
        }

        // ---- Play server TTS WAV via Web Audio API ----
        function playAudio(url, fallbackText) {
            if (isMuted) return Promise.resolve();
            return new Promise(async (resolve) => {
                setState('speaking');
                const audioUrl = './' + url;
                try {
                    const ctx = ensureAudioContext();
                    if (ctx.state === 'suspended') await ctx.resume();
                    const resp = await fetch(audioUrl);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const arrayBuffer = await resp.arrayBuffer();
                    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                    const source = ctx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(ctx.destination);
                    source.onended = () => resolve();
                    source.start();
                    currentAudio = source;
                } catch (e) {
                    console.error('[Mimi] WAV playback failed:', e);
                    currentAudio = null;
                    speak(fallbackText || '').then(resolve);
                }
            });
        }

        // ---- Text input ----
        function autoResize() {
            textInput.style.height = 'auto';
            textInput.style.height = textInput.scrollHeight + 'px';
        }
        textInput.addEventListener('input', autoResize);
        textInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textInput.value.trim();
                if (text) {
                    streamMessage(text, false);
                    textInput.value = '';
                    autoResize();
                }
            }
        });
        sendBtn.addEventListener('click', function() {
            const text = textInput.value.trim();
            if (text) {
                streamMessage(text, false);
                textInput.value = '';
                autoResize();
            }
        });

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
            return div;
        }

        // ---- Mute toggle ----
        function applyMuteUI() {
            muteBtn.classList.toggle('muted', isMuted);
            muteBtn.title = isMuted ? 'Unmute microphone' : 'Mute microphone';
            document.getElementById('muteWave1').style.display = isMuted ? 'none' : '';
            document.getElementById('muteWave2').style.display = isMuted ? 'none' : '';
        }
        applyMuteUI();

        muteBtn.addEventListener('click', function() {
            isMuted = !isMuted;
            document.cookie = 'mimi_mic=' + (isMuted ? 'off' : 'on') + ';path=/;max-age=' + (30*86400);
            applyMuteUI();

            if (vadInstance) {
                if (isMuted) {
                    vadInstance.pause();
                    setState('muted');
                    if (synthesis) synthesis.cancel();
                    if (currentAudio) {
                        try { currentAudio.stop(); } catch(_) {}
                        currentAudio = null;
                    }
                } else {
                    vadInstance.start();
                    setState('idle');
                }
            }
        });

        // ---- VAD initialization ----
        async function initVAD() {
            if (typeof vad === 'undefined') {
                addMessage('error', 'VAD library failed to load.');
                statusText.textContent = 'VAD unavailable';
                return;
            }
            try {
                vadInstance = await vad.MicVAD.new({
                    positiveSpeechThreshold: 0.8,
                    negativeSpeechThreshold: 0.15,
                    minSpeechFrames: 8,
                    preSpeechPadFrames: 5,
                    redemptionFrames: 16,
                    onSpeechStart: () => {},
                    onSpeechEnd: (audio) => {
                        if (isMuted || audio.length < 8000) return;
                        sendAudio(audio);
                    },
                    onVADMisfire: () => {}
                });

                if (isMuted) {
                    setState('muted');
                    statusText.textContent = 'Type a message or unmute to talk';
                } else {
                    vadInstance.start();
                    setState('idle');
                    addMessage('system', 'Say "Mimi" followed by your request.');
                }
            } catch (err) {
                console.error('[Mimi] VAD init error:', err);
                addMessage('error', 'Microphone access failed: ' + err.message);
                statusText.textContent = 'Mic unavailable';
            }
        }

        initVAD();
    })();
    </script>
</body>
</html>
